<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Operator in JS</title>
</head>
<body>
    <h1>Void Operator Handling</h1>
    <!-- "javascript:" = protocol to run JS in HTML -->
    <!-- void() does not return anything, which means <a> does not take you anywhere -->
    <p><a href="javascript:void(console.log('sample from the link'))">Click to run some script</a></p>
    <script src="61_void_operator.js"></script>
</body>
</html>
