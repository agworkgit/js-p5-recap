<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callback Functions</title>
    <style>
        html {
            /* something */
            background: black;
            color: white;
        }
    </style>
</head>
<body>
    <h1>What are 'callback functions'?</h1>
    <h2>How do they work?</h2>
    <script>
        // object
        const app = {
            // method
            geolocation: (good, bad) => { 
                // geolocation params expecting the names of two functions
                // do something
                try {
                    navigator.geolocation.getCurrentPosition(good, bad)
                } catch (err) {
                    // send err message to fail callback function
                    bad.call(app.geolocation, err)
                }
            }
        }

        let success = (position) => {
            const geoObj = { position }
            console.log(`You are 'at' position (${geoObj.position.coords.latitude}, ${geoObj.position.coords.longitude})`)
            // You are 'at' position (33.5670016, -0.1179558)
        } 

        let fail = (err) => {
            console.warn('Something bad happened', err.message)
        }

        app.geolocation(success, fail);

        // Notes: The example was using randomised values for the coords, I did it with the geolocation api (realistic scenario)
    </script>
</body>
</html>
